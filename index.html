<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <script>
    (function () {
      const savedTheme = localStorage.getItem('rhive-theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      if (savedTheme === 'dark') {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    })();
  </script>
  <meta charset="UTF-8" />
  <link rel="icon" href="https://i.imgur.com/t0VcSgJ.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RHIVE - Home</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Identity Services (GIS) — required for Google Calendar OAuth2 -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'rhive-pink': '#ec028b',
            'rhive-gold': '#e2ab49',
            'rhive-blue': '#08137C',
            'rhive-obsidian': '#050505',
            'rhive-dark-card': 'rgba(20, 20, 20, 0.8)',
            'rhive-light-card': 'rgba(255, 255, 255, 0.9)',
          },
          fontFamily: {
            sans: ['Rubik', 'sans-serif'],
            display: ['Space Grotesk', 'sans-serif'],
            serif: ['"EB Garamond"', 'serif'],
            mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'monospace'],
          },
          boxShadow: {
            'pink-glow': '0 0 15px rgba(236, 2, 139, 0.4)',
            'pink-glow-sm': '0 0 8px rgba(236, 2, 139, 0.3)',
          },
          backgroundImage: {
            'circuit-pattern': "url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHBhdGggZD0iTTEgMWgydjJIMXoiIGZpbGw9InJnYmEoMjM2LCAyLCAxMzksIDAuMikiIGZpbGwtcnVsZT0iZXZlbm9kZCIvPjwvc3ZnPg==')",
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: 0, transform: 'translateY(10px)' },
              '100%': { opacity: 1, transform: 'translateY(0)' },
            },
          },
          animation: {
            'fade-in': 'fadeIn 0.7s ease-out forwards',
          },
        },
      },
    }
  </script>
  <style>
    :root {
      --rhive-bg: #050505;
      --rhive-text: #ffffff;
      --rhive-text-muted: #9ca3af;
      --rhive-border: rgba(255, 255, 255, 0.05);
      --rhive-glass: rgba(5, 5, 5, 0.65);
    }

    .light-mode-active {
      --rhive-bg: #f3f4f6;
      --rhive-text: #050505;
      --rhive-text-muted: #4b5563;
      --rhive-border: rgba(0, 0, 0, 0.05);
      --rhive-glass: rgba(255, 255, 255, 0.8);
    }

    body {
      background-color: var(--rhive-bg);
      color: var(--rhive-text);
      transition: background-color 0.3s, color 0.3s;
    }

    .glass-dark {
      background: var(--rhive-glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(236, 2, 139, 0.15);
    }

    .light-mode-active .glass-dark {
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(0, 0, 0, 0.1);
    }

    /* Scroll Progress Bar */
    .progress-container {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      position: fixed;
      top: 0;
      z-index: 1000;
    }

    .progress-bar {
      height: 4px;
      background: #ec028b;
      width: 0%;
      box-shadow: 0 0 10px #ec028b;
    }

    /* Glitch Effect */
    .glitch-wrapper {
      position: relative;
    }

    .glitch-text::before,
    .glitch-text::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: transparent;
    }

    .glitch-text::before {
      left: 2px;
      text-shadow: -1px 0 red;
      animation: glitch-anim-1 2s infinite linear alternate-reverse;
    }

    .glitch-text::after {
      left: -2px;
      text-shadow: -1px 0 blue;
      animation: glitch-anim-2 3s infinite linear alternate-reverse;
    }

    @keyframes glitch-anim-1 {
      0% {
        clip-path: inset(20% 0 80% 0);
      }

      20% {
        clip-path: inset(60% 0 10% 0);
      }

      40% {
        clip-path: inset(40% 0 50% 0);
      }

      60% {
        clip-path: inset(80% 0 5% 0);
      }

      80% {
        clip-path: inset(10% 0 70% 0);
      }

      100% {
        clip-path: inset(30% 0 50% 0);
      }
    }

    @keyframes glitch-anim-2 {
      0% {
        clip-path: inset(10% 0 60% 0);
      }

      20% {
        clip-path: inset(30% 0 20% 0);
      }

      40% {
        clip-path: inset(70% 0 10% 0);
      }

      60% {
        clip-path: inset(20% 0 50% 0);
      }

      80% {
        clip-path: inset(50% 0 30% 0);
      }

      100% {
        clip-path: inset(5% 0 80% 0);
      }
    }

    .neon-border {
      box-shadow: 0 0 15px rgba(236, 2, 139, 0.4);
      border: 1px solid rgba(236, 2, 139, 0.6);
    }

    /* Process Stage Lines */
    .process-line {
      width: 2px;
      background: linear-gradient(to bottom, #ec028b, #08137C);
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      transform: translateX(-50%);
      z-index: 0;
    }

    /* Google Places Autocomplete Styling */
    .pac-container {
      z-index: 10000 !important;
      background-color: #0a0a0a;
      border: 1px solid #374151;
      font-family: 'Rubik', sans-serif;
    }

    .pac-item {
      color: #e5e7eb;
      border-top: 1px solid #1f2937;
      padding: 10px 15px;
    }

    .pac-item:hover {
      background-color: #1f2937;
    }

    .pac-item-query {
      color: #ffffff;
      font-weight: 600;
    }

    .pac-icon {
      filter: invert(1) hue-rotate(300deg) saturate(5);
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: #050505;
    }

    ::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #ec028b;
      box-shadow: 0 0 10px #ec028b;
    }
  </style>
  <script>
    window.googleMapsApiLoaded = false;
    window.googleMapsApiFailed = false;
    function onGoogleMapsApiReady() {
      window.googleMapsApiLoaded = true;
      window.dispatchEvent(new Event('google-maps-api-ready'));
    }
    function onGoogleMapsApiError() {
      window.googleMapsApiFailed = true;
      console.error('[RHIVE] Google Maps failed to load. Check API key validity and billing in GCP console.');
      window.dispatchEvent(new Event('google-maps-api-failed'));
    }
    // Loads Maps API. Key is injected by Vite at serve/build time via %VITE_GOOGLE_MAPS_API_KEY%.
    // Falls back to /api/config fetch for environments where template replacement isn't available.
    (function () {
      function loadMapsScript(apiKey) {
        if (!apiKey) {
          console.warn('[RHIVE] VITE_GOOGLE_MAPS_API_KEY is not set — Maps features disabled.');
          window.googleMapsApiFailed = true;
          window.dispatchEvent(new Event('google-maps-api-failed'));
          return;
        }
        var s = document.createElement('script');
        s.async = true;
        s.onerror = onGoogleMapsApiError;
        s.src = 'https://maps.googleapis.com/maps/api/js?key=' + apiKey + '&libraries=places,drawing,geometry&callback=onGoogleMapsApiReady';
        document.head.appendChild(s);
      }

      // Try Vite template-injected key first (fast, synchronous availability)
      var inlineKey = '%VITE_GOOGLE_MAPS_API_KEY%';
      if (inlineKey && inlineKey.indexOf('%') === -1) {
        // Vite replaced the template variable — use it directly
        loadMapsScript(inlineKey);
      } else {
        // Fall back to /api/config (Vite dev server middleware)
        fetch('/api/config')
          .then(function (res) { return res.json(); })
          .then(function (data) { loadMapsScript(data.mapsApiKey || ''); })
          .catch(function (err) {
            console.error('[RHIVE] Failed to fetch maps key from /api/config:', err);
            window.googleMapsApiFailed = true;
            window.dispatchEvent(new Event('google-maps-api-failed'));
          });
      }
    })();
  </script>
  <link rel="stylesheet" href="/index.css">
</head>

<body class="text-gray-200 selection:bg-rhive-pink/30 selection:text-white">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
