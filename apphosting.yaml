# Firebase App Hosting — Cloud Run configuration
# See https://firebase.google.com/docs/app-hosting/configure
runConfig:
  minInstances: 0

# ─────────────────────────────────────────────────────────────────────────────
# ALL values are stored in GCP Secret Manager — ZERO plaintext secrets here.
# This file is safe to commit to a public repository.
#
# One-time secret setup (run once per secret, then never again):
#   gcloud secrets create <secret-name> --project=rhive-os
#   echo -n "YOUR_VALUE" | gcloud secrets versions add <secret-name> --data-file=-
#
# Firebase App Hosting auto-grants the service account access on first deploy.
# ─────────────────────────────────────────────────────────────────────────────
env:
  # ── Firebase config ────────────────────────────────────────────────────────
  - variable: VITE_FIREBASE_API_KEY
    secret: firebase-api-key
    availability:
      - BUILD
      - RUNTIME

  - variable: VITE_FIREBASE_AUTH_DOMAIN
    secret: firebase-auth-domain
    availability:
      - BUILD
      - RUNTIME

  - variable: VITE_FIREBASE_PROJECT_ID
    secret: firebase-project-id
    availability:
      - BUILD
      - RUNTIME

  - variable: VITE_FIREBASE_STORAGE_BUCKET
    secret: firebase-storage-bucket
    availability:
      - BUILD
      - RUNTIME

  - variable: VITE_FIREBASE_MESSAGING_SENDER_ID
    secret: firebase-messaging-sender-id
    availability:
      - BUILD
      - RUNTIME

  - variable: VITE_FIREBASE_APP_ID
    secret: firebase-app-id
    availability:
      - BUILD
      - RUNTIME

  - variable: VITE_FIREBASE_MEASUREMENT_ID
    secret: firebase-measurement-id
    availability:
      - BUILD
      - RUNTIME

  # ── Third-party API keys ───────────────────────────────────────────────────
  - variable: VITE_GEMINI_API_KEY
    secret: gemini-api-key
    availability:
      - BUILD
      - RUNTIME

  - variable: VITE_GOOGLE_MAPS_API_KEY
    secret: google-maps-api-key
    availability:
      - BUILD
      - RUNTIME

  - variable: VITE_GOOGLE_WEATHER_API_KEY
    secret: google-weather-api-key
    availability:
      - BUILD
      - RUNTIME

  - variable: VITE_OPENWEATHER_API_KEY
    secret: openweather-api-key
    availability:
      - BUILD
      - RUNTIME
