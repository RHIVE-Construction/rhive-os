# Firebase App Hosting — Cloud Run configuration
# See https://firebase.google.com/docs/app-hosting/configure
runConfig:
  minInstances: 0

# ─────────────────────────────────────────────────────────────────────────────
# Firebase config values are public identifiers (safe to commit).
# Sensitive API keys use Secret Manager — zero plaintext secrets in this file.
#
# To create secrets (one-time setup):
#   gcloud secrets create gemini-api-key --project=rhive-os
#   echo -n "YOUR_KEY" | gcloud secrets versions add gemini-api-key --data-file=-
#
#   gcloud secrets create google-maps-api-key --project=rhive-os
#   echo -n "YOUR_KEY" | gcloud secrets versions add google-maps-api-key --data-file=-
#
#   gcloud secrets create google-weather-api-key --project=rhive-os
#   echo -n "YOUR_KEY" | gcloud secrets versions add google-weather-api-key --data-file=-
#
#   gcloud secrets create openweather-api-key --project=rhive-os
#   echo -n "YOUR_KEY" | gcloud secrets versions add openweather-api-key --data-file=-
# ─────────────────────────────────────────────────────────────────────────────
env:
  # ── Firebase config (public identifiers — safe as plaintext) ──────────────
  - variable: VITE_FIREBASE_API_KEY
    value: AIzaSyBI7Ae41_JcMtHLuAzit3ajoTRHjETtCt8
    availability:
      - BUILD
      - RUNTIME

  - variable: VITE_FIREBASE_AUTH_DOMAIN
    value: rhive-os.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME

  - variable: VITE_FIREBASE_PROJECT_ID
    value: rhive-os
    availability:
      - BUILD
      - RUNTIME

  - variable: VITE_FIREBASE_STORAGE_BUCKET
    value: rhive-os.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME

  - variable: VITE_FIREBASE_MESSAGING_SENDER_ID
    value: "672274474306"
    availability:
      - BUILD
      - RUNTIME

  - variable: VITE_FIREBASE_APP_ID
    value: 1:672274474306:web:226d0a7064e8ae894e14db
    availability:
      - BUILD
      - RUNTIME

  - variable: VITE_FIREBASE_MEASUREMENT_ID
    value: G-T8H6BQPK3H
    availability:
      - BUILD
      - RUNTIME

  # ── Sensitive API keys — stored in GCP Secret Manager ─────────────────────
  # Run setup-secrets.sh once to create these secrets before first deploy.
  - variable: VITE_GEMINI_API_KEY
    secret: gemini-api-key
    availability:
      - BUILD
      - RUNTIME

  - variable: VITE_GOOGLE_MAPS_API_KEY
    secret: google-maps-api-key
    availability:
      - BUILD
      - RUNTIME

  - variable: VITE_GOOGLE_WEATHER_API_KEY
    secret: google-weather-api-key
    availability:
      - BUILD
      - RUNTIME

  - variable: VITE_OPENWEATHER_API_KEY
    secret: openweather-api-key
    availability:
      - BUILD
      - RUNTIME
  - variable: VITE_GEMINI_API_KEY
    value: AIzaSyC6-RDd8ijIS6BYg3hbYCk8F16li-74KWM
    availability:
      - BUILD
      - RUNTIME
  # Google Maps Embed + Static Maps API key
  # Get from: https://console.cloud.google.com/apis/credentials
  # Enable: Maps Embed API, Maps Static API, Maps JavaScript API
  # Restrict to: https://rhive-os--rhive-os.us-central1.hosted.app/*
  - variable: VITE_GOOGLE_MAPS_API_KEY
    value: AIzaSyAKE58hL99Sl5AATLEt-B3h9NQGxf778cY
    availability:
      - BUILD
